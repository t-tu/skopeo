name: 批量同步镜像 DockerHub/GHCR -> 阿里云镜像仓库
run-name: 镜像批量同步任务
on:
  workflow_dispatch: # 网页手动运行
  # 如需定时每日同步，解除注释
  # schedule:
  #   - cron: '0 1 * * *'

env:
  # =====================【自行修改此处配置】=====================
  SWR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  SWR_NAMESPACE: seasky-images
  # 镜像清单，支持两种格式：
  # 1. DockerHub：postgres:17
  # 2. GHCR完整地址：ghcr.io/requarks/wiki:2
  IMAGE_LIST: |
    postgres:17
    ghcr.io/requarks/wiki:2
    ghcr.io/requarks/wiki-update-companion:latest
  # ==============================================================

jobs:
  sync-task:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 skopeo
        run: |
          sudo apt update -y
          sudo apt install -y skopeo

      - name: 执行批量镜像同步
        env:
          SWR_USER: ${{ secrets.SWR_USER }}
          SWR_PWD: ${{ secrets.SWR_PWD }}
        run: |
          echo "===== 目标仓库：${SWR_REGISTRY}/${SWR_NAMESPACE} ====="
          echo "${IMAGE_LIST}" | while read IMAGE_RAW; do
            # 跳过空行
            [[ -z "${IMAGE_RAW}" ]] && continue

            # 判断是否带域名：ghcr.io / docker.io
            if [[ "${IMAGE_RAW}" == ghcr.io/* ]]; then
              # GHCR镜像
              SRC="docker://${IMAGE_RAW}"
              IMAGE_PATH="${IMAGE_RAW#ghcr.io/}"
            else
              # DockerHub镜像，自动补齐docker.io
              SRC="docker://docker.io/${IMAGE_RAW}"
              IMAGE_PATH="${IMAGE_RAW}"
            fi

            DST="docker://${SWR_REGISTRY}/${SWR_NAMESPACE}/${IMAGE_PATH}"

            echo "============================================="
            echo "源镜像：${SRC}"
            echo "目标镜像：${DST}"
            echo "============================================="

            # 最多尝试3次同步
            for attempt in {1..3}; do
              if skopeo copy \
                --all \
                --preserve-digests \
                --retry-times 2 \
                "${SRC}" \
                "${DST}" \
                --dest-creds "${SWR_USER}:${SWR_PWD}"
              then
                echo "✅ ${IMAGE_RAW} 同步完成"
                break
              else
                echo "❌ ${IMAGE_RAW} 第${attempt}次同步失败，等待10秒重试"
                sleep 10
              fi
            done
          done
